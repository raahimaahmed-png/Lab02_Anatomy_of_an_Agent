<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Data Flow Prototype Lab — GA</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; }
    textarea:focus { border-color: #E5231F !important; outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const C = {
      red: "#E5231F", darkRed: "#B71C1C", black: "#1A1A1A", charcoal: "#2D2D2D",
      darkGray: "#444", medGray: "#888", lightGray: "#F5F5F5", warmGray: "#ECECEC",
      white: "#FFFFFF", offWhite: "#FAFAFA", green: "#2E7D32", amber: "#F9A825",
    };

    const SECTIONS = [
      { id: "welcome", label: "Welcome", icon: "🏠" },
      { id: "exercise1", label: "Agent vs Assistant", icon: "⚡" },
      { id: "exercise2", label: "Agent Loop", icon: "🔄" },
      { id: "exercise3", label: "Data Flow", icon: "🗺️" },
      { id: "exercise4", label: "Build an Agent", icon: "🤖" },
      { id: "quiz", label: "Quiz", icon: "✅" },
      { id: "results", label: "Results", icon: "🏆" },
    ];

    const CLASSIFY_ITEMS = [
      { id: "c1", text: "Responds to one prompt at a time", answer: "assistant" },
      { id: "c2", text: "Pursues goals across multiple steps", answer: "agent" },
      { id: "c3", text: "Uses tools to affect the real world", answer: "agent" },
      { id: "c4", text: "No persistent memory between requests", answer: "assistant" },
      { id: "c5", text: "Observes results and adjusts strategy", answer: "agent" },
      { id: "c6", text: "Human directs every single action", answer: "assistant" },
      { id: "c7", text: "Maintains state and tracks progress", answer: "agent" },
      { id: "c8", text: "Generates a single output per request", answer: "assistant" },
    ];

    const LOOP_STEPS_CORRECT = ["Input", "Interpret Goal", "Plan", "Act", "Observe", "Adjust"];
    const LOOP_STEPS_SHUFFLED_INIT = ["Observe", "Plan", "Adjust", "Input", "Act", "Interpret Goal"];

    const FLOW_STAGES = [
      { id: "input", label: "INPUT", color: C.red, correctItems: ["Topic received", "Platform selected", "Audience defined", "Tone specified"], allOptions: ["Topic received", "Platform selected", "Audience defined", "Tone specified", "Draft post", "Web search", "A/B test variations", "Publish post"] },
      { id: "reasoning", label: "REASONING", color: C.darkRed, correctItems: ["Interpret goal", "Plan research", "Identify keywords", "Select strategy"], allOptions: ["Interpret goal", "Plan research", "Identify keywords", "Select strategy", "Send emails", "Monitor metrics", "Schedule time", "Query databases"] },
      { id: "action", label: "ACTION", color: "#D32F2F", correctItems: ["Web search", "Trend analysis", "Competitor scan", "Data gathering"], allOptions: ["Web search", "Trend analysis", "Competitor scan", "Data gathering", "Tone specified", "Format output", "Interpret goal", "Store patterns"] },
      { id: "generate", label: "GENERATE", color: C.charcoal, correctItems: ["Draft post", "Add hashtags", "Optimize copy", "Format output"], allOptions: ["Draft post", "Add hashtags", "Optimize copy", "Format output", "Platform selected", "Plan research", "Publish post", "Audience defined"] },
      { id: "output", label: "OUTPUT", color: C.black, correctItems: ["Publish post", "Schedule time", "Log action"], allOptions: ["Publish post", "Schedule time", "Log action", "Identify keywords", "Web search", "Draft post", "Trend analysis", "Select strategy"] },
    ];

    const QUIZ_QUESTIONS = [
      { q: "What is the PRIMARY difference between an AI assistant and an AI agent?", options: ["Agents use larger language models", "Agents pursue goals autonomously through iterative loops", "Agents are always more accurate", "Agents don't need prompts to function"], correct: 1, explanation: "The core distinction is that agents pursue goals through iterative loops — they plan, act, observe, and adjust." },
      { q: "Which of these is NOT one of the five core components of an agent?", options: ["Goal", "Perception", "Database", "Feedback"], correct: 2, explanation: "The five core components are Goal, Perception, Reasoning, Action, and Feedback. A database is a tool, not a core component." },
      { q: "Why does 'Model ≠ System' matter for agent design?", options: ["Because models are too expensive", "An LLM alone only predicts tokens — autonomy requires state, tools, and goals", "Systems are slower than models", "Models can't process text"], correct: 1, explanation: "An LLM is a pattern-completion engine. Autonomy emerges from the system wrapping the model with memory, tools, goals, and feedback." },
      { q: "In the Agent Loop, what happens after the 'Act' step?", options: ["The agent stops", "Interpret Goal", "Observe", "Input"], correct: 2, explanation: "After acting, the agent observes results, then adjusts. This observe-adjust cycle enables autonomous behavior." },
      { q: "What is 'prompt injection' in agentic AI security?", options: ["A way to make agents faster", "Malicious input that hijacks agent behavior", "A prompt quality method", "A training technique"], correct: 1, explanation: "Prompt injection embeds malicious instructions in data the agent processes, hijacking its behavior." },
      { q: "Which wave of AI introduced autonomous goal-driven execution?", options: ["Machine Learning", "Deep Learning", "Generative AI", "Agentic AI"], correct: 3, explanation: "Agentic AI is the fifth wave — the first with autonomous goal-driven execution." },
      { q: "Why are 'guardrails' essential in responsible agent design?", options: ["They make agents faster", "They prevent harmful or unintended behaviors", "They reduce API costs", "They improve accuracy"], correct: 1, explanation: "Guardrails prevent harmful actions — like deleting data or sending incorrect communications." },
      { q: "In a Social Media Post Generator agent, where does 'A/B test variations' belong?", options: ["Input", "Reasoning", "Generate", "Feedback Loop (Adjust)"], correct: 3, explanation: "A/B testing is part of the feedback Adjust phase — using performance data to refine content." },
    ];

    const AGENT_TEMPLATES = [
      { id: "social", label: "Social Media Post Generator", icon: "📱", description: "Creates an engaging social media post about a given topic", defaultGoal: "Generate an engaging, platform-optimized social media post" },
      { id: "email", label: "Customer Reply Agent", icon: "📧", description: "Drafts a professional response to a customer inquiry", defaultGoal: "Draft a helpful, empathetic customer response" },
      { id: "research", label: "Research Summarizer", icon: "🔬", description: "Summarizes key findings from a topic into bullet points", defaultGoal: "Produce a concise, accurate research summary" },
      { id: "code", label: "Code Review Agent", icon: "💻", description: "Reviews code snippets and suggests improvements", defaultGoal: "Identify bugs, style issues, and suggest improvements" },
    ];

    const AVAILABLE_TOOLS = [
      { id: "web_search", label: "Web Search", icon: "🔍", desc: "Search the internet for current information" },
      { id: "database", label: "Database Query", icon: "🗄️", desc: "Read/write from structured data stores" },
      { id: "text_gen", label: "Text Generator", icon: "✍️", desc: "Generate and format written content" },
      { id: "sentiment", label: "Sentiment Analyzer", icon: "😊", desc: "Analyze emotional tone of text" },
      { id: "scheduler", label: "Scheduler", icon: "📅", desc: "Schedule actions for future execution" },
      { id: "validator", label: "Output Validator", icon: "✅", desc: "Check output quality before publishing" },
    ];

    const GUARDRAIL_OPTIONS = [
      { id: "max_retries", label: "Max Retries: 3", desc: "Limit retry attempts to prevent infinite loops" },
      { id: "human_review", label: "Human-in-the-Loop", desc: "Require human approval before final output" },
      { id: "content_filter", label: "Content Filter", desc: "Block harmful, biased, or off-topic content" },
      { id: "cost_limit", label: "Cost Limit", desc: "Cap API spending per execution" },
      { id: "timeout", label: "Timeout: 60s", desc: "Kill execution after time limit" },
      { id: "audit_log", label: "Audit Logging", desc: "Record every decision and action" },
    ];

    const MEMORY_OPTIONS = [
      { id: "short_term", label: "Short-term Context", desc: "Current conversation and recent actions" },
      { id: "long_term", label: "Long-term Knowledge", desc: "Persistent facts and learned preferences" },
      { id: "task_state", label: "Task Tracking", desc: "Progress, completed steps, pending actions" },
    ];

    function ProgressBar({ current, total }) {
      return (
        <div style={{ width: "100%", height: 4, background: C.warmGray, borderRadius: 2 }}>
          <div style={{ width: `${(current / total) * 100}%`, height: "100%", background: C.red, borderRadius: 2, transition: "width 0.5s ease" }} />
        </div>
      );
    }

    function Badge({ children, color = C.red }) {
      return <span style={{ display: "inline-block", padding: "3px 10px", borderRadius: 3, background: color, color: C.white, fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>{children}</span>;
    }

    function StageTag({ label, active }) {
      return <div style={{ padding: "6px 14px", borderRadius: 4, fontSize: 12, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", background: active ? C.red : C.warmGray, color: active ? C.white : C.medGray, transition: "all 0.3s ease" }}>{label}</div>;
    }

    function WelcomeSection({ onNext }) {
      const [vis, setVis] = useState(false);
      useEffect(() => { setTimeout(() => setVis(true), 100); }, []);
      return (
        <div style={{ opacity: vis ? 1 : 0, transform: vis ? "translateY(0)" : "translateY(20px)", transition: "all 0.6s ease" }}>
          <div style={{ textAlign: "center", marginBottom: 36 }}>
            <div style={{ display: "inline-block", background: C.red, padding: "6px 20px", borderRadius: 4, marginBottom: 14 }}>
              <span style={{ color: C.white, fontSize: 12, fontWeight: 700, letterSpacing: 3 }}>HANDS-ON LAB</span>
            </div>
            <h1 style={{ fontSize: 34, fontWeight: 800, color: C.black, margin: "10px 0 8px", lineHeight: 1.15 }}>
              Visual Data Flow<br />Prototype Lab
            </h1>
            <p style={{ color: C.medGray, fontSize: 15, maxWidth: 520, margin: "0 auto 28px", lineHeight: 1.6 }}>
              Map the reasoning and data flow for a <strong style={{ color: C.black }}>Social Media Post Generator</strong> agent. Classify, sequence, map, <strong style={{ color: C.red }}>build a real agent</strong>, and test your knowledge.
            </p>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, maxWidth: 560, margin: "0 auto 32px" }}>
            {[
              { icon: "⚡", title: "Classify", desc: "Sort assistant vs. agent behaviors" },
              { icon: "🔄", title: "Sequence", desc: "Order the agent loop correctly" },
              { icon: "🗺️", title: "Map", desc: "Assign actions to data flow stages" },
              { icon: "🤖", title: "Build", desc: "Configure & run a real mini agent", highlight: true },
              { icon: "✅", title: "Quiz", desc: "Test your agentic AI knowledge" },
            ].map((item, i) => (
              <div key={i} style={{ background: item.highlight ? "#FFF5F5" : C.white, border: item.highlight ? `2px solid ${C.red}` : `1px solid ${C.warmGray}`, borderRadius: 8, padding: "16px 14px", display: "flex", gap: 10, alignItems: "flex-start" }}>
                <span style={{ fontSize: 22, lineHeight: 1 }}>{item.icon}</span>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 13, color: C.black }}>{item.title}{item.highlight && <span style={{ color: C.red, marginLeft: 6, fontSize: 10, fontWeight: 800 }}>NEW</span>}</div>
                  <div style={{ fontSize: 11, color: C.medGray, marginTop: 2 }}>{item.desc}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ textAlign: "center" }}>
            <button onClick={onNext} style={{ background: C.red, color: C.white, border: "none", padding: "13px 36px", borderRadius: 6, fontSize: 15, fontWeight: 700, cursor: "pointer", letterSpacing: 0.5, boxShadow: "0 4px 14px rgba(229,35,31,0.3)" }}>
              Start Lab →
            </button>
          </div>
        </div>
      );
    }

    function Exercise1({ onNext, onScore }) {
      const [placements, setPlacements] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [items] = useState(() => [...CLASSIFY_ITEMS].sort(() => Math.random() - 0.5));
      const handleDrop = (itemId, zone) => { if (!submitted) setPlacements(p => ({ ...p, [itemId]: zone })); };
      const handleSubmit = () => { let s = 0; items.forEach(i => { if (placements[i.id] === i.answer) s++; }); onScore("exercise1", s, items.length); setSubmitted(true); };
      const allPlaced = Object.keys(placements).length === items.length;
      const unplaced = items.filter(i => !placements[i.id]);
      const assistantItems = items.filter(i => placements[i.id] === "assistant");
      const agentItems = items.filter(i => placements[i.id] === "agent");

      const DragItem = ({ item }) => {
        const ok = submitted && placements[item.id] === item.answer;
        const bad = submitted && placements[item.id] && placements[item.id] !== item.answer;
        return (
          <div draggable={!submitted} onDragStart={e => e.dataTransfer.setData("text/plain", item.id)}
            style={{ padding: "9px 13px", borderRadius: 6, fontSize: 13, cursor: submitted ? "default" : "grab", background: ok ? "#E8F5E9" : bad ? "#FFEBEE" : C.white, border: `2px solid ${ok ? C.green : bad ? C.red : C.warmGray}`, fontWeight: 500, color: C.charcoal, transition: "all 0.2s ease", userSelect: "none", boxShadow: submitted ? "none" : "0 2px 6px rgba(0,0,0,0.06)" }}>
            {item.text}
            {ok && <span style={{ float: "right", color: C.green }}>✓</span>}
            {bad && <span style={{ float: "right", color: C.red, fontSize: 11 }}>✗ → {item.answer === "agent" ? "Agent" : "Assistant"}</span>}
          </div>
        );
      };

      const DropZone = ({ zone, label, color, items: zi }) => (
        <div onDragOver={e => e.preventDefault()} onDrop={e => { e.preventDefault(); handleDrop(e.dataTransfer.getData("text/plain"), zone); }}
          style={{ flex: 1, minHeight: 200, borderRadius: 10, padding: 14, background: C.white, border: `2px dashed ${color}40` }}>
          <div style={{ background: color, color: C.white, padding: "5px 12px", borderRadius: 4, fontSize: 12, fontWeight: 700, letterSpacing: 2, textAlign: "center", marginBottom: 10 }}>{label}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>{zi.map(i => <DragItem key={i.id} item={i} />)}</div>
          {zi.length === 0 && !submitted && <p style={{ color: C.medGray, fontSize: 11, textAlign: "center", marginTop: 20, fontStyle: "italic" }}>Drag items here</p>}
        </div>
      );

      return (
        <div>
          <Badge>Exercise 1 of 4</Badge>
          <h2 style={{ fontSize: 24, fontWeight: 800, color: C.black, margin: "10px 0 6px" }}>Classify: Assistant vs. Agent</h2>
          <p style={{ color: C.medGray, fontSize: 13, marginBottom: 16 }}>Drag each behavior into the correct category.</p>
          {unplaced.length > 0 && (
            <div style={{ marginBottom: 16, padding: 14, background: C.lightGray, borderRadius: 10 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: C.medGray, letterSpacing: 1, marginBottom: 8 }}>UNCLASSIFIED</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>{unplaced.map(i => <DragItem key={i.id} item={i} />)}</div>
            </div>
          )}
          <div style={{ display: "flex", gap: 14, marginBottom: 10 }}>
            <DropZone zone="assistant" label="ASSISTANT" color={C.charcoal} items={assistantItems} />
            <DropZone zone="agent" label="AGENT" color={C.red} items={agentItems} />
          </div>
          <details style={{ marginBottom: 14, fontSize: 11, color: C.medGray }}>
            <summary style={{ cursor: "pointer" }}>On mobile? Tap to classify</summary>
            <div style={{ marginTop: 6, display: "flex", flexDirection: "column", gap: 5 }}>
              {items.filter(i => !placements[i.id]).map(item => (
                <div key={item.id} style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <span style={{ fontSize: 12, flex: 1 }}>{item.text}</span>
                  <button onClick={() => handleDrop(item.id, "assistant")} style={{ padding: "3px 8px", borderRadius: 4, border: `1px solid ${C.charcoal}`, background: "transparent", fontSize: 10, cursor: "pointer" }}>Assistant</button>
                  <button onClick={() => handleDrop(item.id, "agent")} style={{ padding: "3px 8px", borderRadius: 4, border: `1px solid ${C.red}`, background: "transparent", fontSize: 10, cursor: "pointer", color: C.red }}>Agent</button>
                </div>
              ))}
            </div>
          </details>
          <div style={{ display: "flex", gap: 10 }}>
            {!submitted && <button onClick={handleSubmit} disabled={!allPlaced} style={{ background: allPlaced ? C.red : C.warmGray, color: allPlaced ? C.white : C.medGray, border: "none", padding: "11px 28px", borderRadius: 6, fontSize: 14, fontWeight: 700, cursor: allPlaced ? "pointer" : "not-allowed" }}>Check Answers</button>}
            {submitted && <button onClick={onNext} style={{ background: C.red, color: C.white, border: "none", padding: "11px 28px", borderRadius: 6, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Continue →</button>}
          </div>
        </div>
      );
    }

    function Exercise2({ onNext, onScore }) {
      const [steps, setSteps] = useState([...LOOP_STEPS_SHUFFLED_INIT]);
      const [submitted, setSubmitted] = useState(false);
      const [dragIdx, setDragIdx] = useState(null);
      const moveItem = (idx, d) => { if (submitted) return; const n = idx + d; if (n < 0 || n >= steps.length) return; const s = [...steps]; [s[idx], s[n]] = [s[n], s[idx]]; setSteps(s); };
      const handleSubmit = () => { let s = 0; steps.forEach((st, i) => { if (st === LOOP_STEPS_CORRECT[i]) s++; }); onScore("exercise2", s, LOOP_STEPS_CORRECT.length); setSubmitted(true); };
      const icons = ["🎯", "🧭", "📋", "⚡", "👁️", "🔄"];
      return (
        <div>
          <Badge>Exercise 2 of 4</Badge>
          <h2 style={{ fontSize: 24, fontWeight: 800, color: C.black, margin: "10px 0 6px" }}>Build the Agent Loop</h2>
          <p style={{ color: C.medGray, fontSize: 13, marginBottom: 4 }}>Reorder the steps. The loop starts with input and cycles through reasoning, action, and feedback.</p>
          <p style={{ color: C.red, fontSize: 12, fontWeight: 600, marginBottom: 18 }}>Think: What happens first? What comes after the agent acts?</p>
          <div style={{ maxWidth: 460, margin: "0 auto 20px" }}>
            {steps.map((step, i) => {
              const ci = LOOP_STEPS_CORRECT.indexOf(step);
              const ok = submitted && step === LOOP_STEPS_CORRECT[i];
              const bad = submitted && step !== LOOP_STEPS_CORRECT[i];
              return (
                <div key={step} draggable={!submitted} onDragStart={() => setDragIdx(i)} onDragOver={e => e.preventDefault()}
                  onDrop={() => { if (!submitted && dragIdx !== null) { const n = [...steps]; const [m] = n.splice(dragIdx, 1); n.splice(i, 0, m); setSteps(n); setDragIdx(null); } }}
                  style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", marginBottom: 7, borderRadius: 8, cursor: submitted ? "default" : "grab", background: ok ? "#E8F5E9" : bad ? "#FFEBEE" : C.white, border: `2px solid ${ok ? C.green : bad ? C.red : C.warmGray}`, userSelect: "none", boxShadow: "0 2px 6px rgba(0,0,0,0.04)" }}>
                  <div style={{ width: 30, height: 30, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", background: ok ? C.green : bad ? C.red : C.red + "15", color: (ok || bad) ? C.white : C.red, fontSize: 13, fontWeight: 800 }}>{i + 1}</div>
                  <span style={{ fontSize: 18 }}>{icons[ci]}</span>
                  <span style={{ flex: 1, fontSize: 14, fontWeight: 600, color: C.charcoal }}>{step}</span>
                  {!submitted && <div style={{ display: "flex", flexDirection: "column", gap: 1 }}>
                    <button onClick={() => moveItem(i, -1)} style={{ border: "none", background: "transparent", cursor: "pointer", fontSize: 13, padding: "0 3px", color: C.medGray }}>▲</button>
                    <button onClick={() => moveItem(i, 1)} style={{ border: "none", background: "transparent", cursor: "pointer", fontSize: 13, padding: "0 3px", color: C.medGray }}>▼</button>
                  </div>}
                  {ok && <span style={{ color: C.green, fontWeight: 700 }}>✓</span>}
                  {bad && <span style={{ color: C.red, fontSize: 10, fontWeight: 600 }}>→ #{LOOP_STEPS_CORRECT.indexOf(step) + 1}</span>}
                </div>
              );
            })}
          </div>
          {submitted && <div style={{ background: C.lightGray, borderRadius: 8, padding: 14, marginBottom: 16, borderLeft: `4px solid ${C.red}` }}><p style={{ fontSize: 12, color: C.charcoal, margin: 0, lineHeight: 1.6 }}><strong>The Agent Loop:</strong> Input → Interpret Goal → Plan → Act → Observe → Adjust → <span style={{ color: C.red, fontWeight: 700 }}>REPEAT</span>.</p></div>}
          {!submitted ? <button onClick={handleSubmit} style={{ background: C.red, color: C.white, border: "none", padding: "11px 28px", borderRadius: 6, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Check Order</button>
            : <button onClick={onNext} style={{ background: C.red, color: C.white, border: "none", padding: "11px 28px", borderRadius: 6, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Continue →</button>}
        </div>
      );
    }

    function Exercise3({ onNext, onScore }) {
      const [cs, setCs] = useState(0);
      const [sel, setSel] = useState({});
      const [sub, setSub] = useState({});
      const [done, setDone] = useState(false);
      const stage = FLOW_STAGES[cs];
      const ss = sel[stage?.id] || [];
      const [shuffled] = useState(() => { const m = {}; FLOW_STAGES.forEach(s => { m[s.id] = [...s.allOptions].sort(() => Math.random() - 0.5); }); return m; });
      const toggle = (o) => { if (sub[stage.id]) return; const c = sel[stage.id] || []; setSel({ ...sel, [stage.id]: c.includes(o) ? c.filter(x => x !== o) : [...c, o] }); };
      const submitStage = () => setSub({ ...sub, [stage.id]: true });
      const nextStage = () => {
        if (cs < FLOW_STAGES.length - 1) { setCs(cs + 1); } else {
          let tc = 0, tp = 0;
          FLOW_STAGES.forEach(s => { const sl = sel[s.id] || []; s.correctItems.forEach(i => { tp++; if (sl.includes(i)) tc++; }); sl.forEach(i => { if (!s.correctItems.includes(i)) tc = Math.max(0, tc - 0.5); }); });
          onScore("exercise3", Math.round(tc), tp); setDone(true);
        }
      };
      if (done) return (
        <div>
          <Badge color={C.green}>Complete</Badge>
          <h2 style={{ fontSize: 24, fontWeight: 800, color: C.black, margin: "10px 0 8px" }}>Data Flow Mapped! 🗺️</h2>
          <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
            {FLOW_STAGES.map((s, i) => (<div key={s.id} style={{ display: "flex", alignItems: "center", gap: 6 }}><div style={{ padding: "6px 12px", borderRadius: 6, background: s.color, color: C.white, fontSize: 11, fontWeight: 700, letterSpacing: 1 }}>{s.label}</div>{i < FLOW_STAGES.length - 1 && <span style={{ color: C.red, fontSize: 16 }}>→</span>}</div>))}
          </div>
          <button onClick={onNext} style={{ background: C.red, color: C.white, border: "none", padding: "11px 28px", borderRadius: 6, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Continue →</button>
        </div>
      );
      return (
        <div>
          <Badge>Exercise 3 of 4</Badge>
          <h2 style={{ fontSize: 24, fontWeight: 800, color: C.black, margin: "10px 0 6px" }}>Data Flow Mapper</h2>

      const [showExp, setShowExp] = useState(false);
      const [done, setDone] = useState(false);
      const q = QUIZ_QUESTIONS[cq];
      const select = (i) => { if (ans[cq] !== undefined) return; setAns({ ...ans, [cq]: i }); setShowExp(true); };
      const next = () => {
        setShowExp(false);
        if (cq < QUIZ_QUESTIONS.length - 1) { setCq(cq + 1); }
        else { let s = 0; QUIZ_QUESTIONS.forEach((q2, i) => { if (ans[i] === q2.correct) s++; }); onScore("quiz", s, QUIZ_QUESTIONS.length); setDone(true); }
      };
      if (done) { setTimeout(onNext, 100); return <div style={{ textAlign: "center", padding: 40, fontSize: 16, color: C.medGray }}>Calculating results...</div>; }
      return (
        <div>
          <Badge>Knowledge Check</Badge>
          <h2 style={{ fontSize: 20, fontWeight: 800, color: C.black, margin: "10px 0 6px" }}>Question {cq + 1} of {QUIZ_QUESTIONS.length}</h2>
          <ProgressBar current={cq + 1} total={QUIZ_QUESTIONS.length} />
          <div style={{ marginTop: 20, padding: 18, background: C.white, borderRadius: 10, border: `2px solid ${C.warmGray}` }}>
            <p style={{ fontSize: 15, fontWeight: 600, color: C.black, marginBottom: 16, lineHeight: 1.5 }}>{q.q}</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {q.options.map((o, i) => {
                const sel = ans[cq] === i, ok = i === q.correct, rev = ans[cq] !== undefined;
                let bg = C.offWhite, bd = C.warmGray;
                if (rev) { if (ok) { bg = "#E8F5E9"; bd = C.green; } else if (sel && !ok) { bg = "#FFEBEE"; bd = C.red; } }
                return (
                  <div key={i} onClick={() => select(i)} style={{ padding: "11px 14px", borderRadius: 8, border: `2px solid ${bd}`, background: bg, cursor: rev ? "default" : "pointer", display: "flex", alignItems: "center", gap: 10, transition: "all 0.2s ease" }}>
                    <div style={{ width: 26, height: 26, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, background: rev && ok ? C.green : rev && sel ? C.red : C.warmGray, color: rev ? C.white : C.medGray, fontSize: 12, fontWeight: 700 }}>{rev ? (ok ? "✓" : sel ? "✗" : String.fromCharCode(65 + i)) : String.fromCharCode(65 + i)}</div>
                    <span style={{ fontSize: 13, fontWeight: 500, color: C.charcoal }}>{o}</span>
                  </div>
                );
              })}
            </div>
            {showExp && <div style={{ marginTop: 14, padding: 12, borderRadius: 8, background: C.lightGray, borderLeft: `4px solid ${ans[cq] === q.correct ? C.green : C.red}` }}><p style={{ fontSize: 12, color: C.charcoal, margin: 0, lineHeight: 1.5 }}><strong>{ans[cq] === q.correct ? "Correct! " : "Not quite. "}</strong>{q.explanation}</p></div>}
          </div>
          {showExp && <button onClick={next} style={{ marginTop: 14, background: C.red, color: C.white, border: "none", padding: "11px 28px", borderRadius: 6, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>{cq < QUIZ_QUESTIONS.length - 1 ? "Next Question →" : "See Results →"}</button>}
        </div>
      );
    }

    function ResultsSection({ scores }) {
      const [vis, setVis] = useState(false);
      useEffect(() => { setTimeout(() => setVis(true), 200); }, []);
      const totalE = Object.values(scores).reduce((s, x) => s + x.earned, 0);
      const totalP = Object.values(scores).reduce((s, x) => s + x.possible, 0);
      const pct = Math.round((totalE / totalP) * 100);
      const grade = pct >= 90 ? { l: "Agent Architect", e: "🏆", m: "Outstanding mastery of agentic AI!" } : pct >= 70 ? { l: "Loop Builder", e: "🔄", m: "Solid understanding! Review what you missed." } : pct >= 50 ? { l: "Apprentice", e: "📚", m: "Good start! Revisit the slides and try again." } : { l: "Explorer", e: "🔍", m: "Keep learning! Re-read core concepts." };
      return (
        <div style={{ opacity: vis ? 1 : 0, transform: vis ? "translateY(0)" : "translateY(20px)", transition: "all 0.6s ease", textAlign: "center" }}>
          <div style={{ fontSize: 56, marginBottom: 6 }}>{grade.e}</div>
          <h2 style={{ fontSize: 28, fontWeight: 800, color: C.black, margin: "0 0 4px" }}>{grade.l}</h2>
          <p style={{ color: C.medGray, fontSize: 14, marginBottom: 24 }}>{grade.m}</p>
          <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 110, height: 110, borderRadius: "50%", margin: "0 auto 24px", background: `conic-gradient(${C.red} ${pct * 3.6}deg, ${C.warmGray} 0deg)`, position: "relative" }}>
            <div style={{ width: 88, height: 88, borderRadius: "50%", background: C.offWhite, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <span style={{ fontSize: 26, fontWeight: 800, color: C.black }}>{pct}%</span>
            </div>
          </div>
          <div style={{ maxWidth: 420, margin: "0 auto", textAlign: "left" }}>
            {[{ key: "exercise1", label: "Classify: Agent vs Assistant" }, { key: "exercise2", label: "Build the Agent Loop" }, { key: "exercise3", label: "Data Flow Mapper" }, { key: "exercise4", label: "Build a Mini Agent" }, { key: "quiz", label: "Knowledge Check Quiz" }].map(item => {
              const s = scores[item.key]; if (!s) return null;
              const p = Math.round((s.earned / s.possible) * 100);
              return (
                <div key={item.key} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: `1px solid ${C.warmGray}` }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: p >= 80 ? C.green : p >= 50 ? C.amber : C.red, flexShrink: 0 }} />
                  <span style={{ flex: 1, fontSize: 13, fontWeight: 500, color: C.charcoal }}>{item.label}</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: C.black }}>{s.earned}/{s.possible}</span>
                  <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 7px", borderRadius: 4, background: p >= 80 ? "#E8F5E9" : p >= 50 ? "#FFF3E0" : "#FFEBEE", color: p >= 80 ? C.green : p >= 50 ? "#E65100" : C.red }}>{p}%</span>
                </div>
              );
            })}
          </div>
          <div style={{ marginTop: 24, padding: 14, background: C.lightGray, borderRadius: 10, maxWidth: 420, margin: "24px auto 0" }}>
            <p style={{ fontSize: 12, color: C.charcoal, margin: 0, lineHeight: 1.6 }}>
              <strong style={{ color: C.red }}>Key Takeaway:</strong> Agentic AI is the autonomy shift. Agents are architectures built from goals, tools, memory, and feedback loops. The core difference is <strong>goal-driven execution</strong>.
            </p>
          </div>
        </div>
      );
    }

    function App() {
      const [cs, setCs] = useState(0);
      const [scores, setScores] = useState({});
      const handleScore = (k, e, p) => setScores(prev => ({ ...prev, [k]: { earned: e, possible: p } }));
      const goNext = () => setCs(prev => Math.min(prev + 1, SECTIONS.length - 1));
      const renderSection = () => {
        switch (SECTIONS[cs].id) {
          case "welcome": return <WelcomeSection onNext={goNext} />;
          case "exercise1": return <Exercise1 onNext={goNext} onScore={handleScore} />;
          case "exercise2": return <Exercise2 onNext={goNext} onScore={handleScore} />;
          case "exercise3": return <Exercise3 onNext={goNext} onScore={handleScore} />;
          case "exercise4": return <Exercise4 onNext={goNext} onScore={handleScore} />;
          case "quiz": return <QuizSection onNext={goNext} onScore={handleScore} />;
          case "results": return <ResultsSection scores={scores} />;
          default: return null;
        }
      };
      return (
        <div style={{ minHeight: "100vh", background: C.offWhite }}>
          <div style={{ position: "sticky", top: 0, zIndex: 100, background: C.black, borderBottom: `3px solid ${C.red}` }}>
            <div style={{ maxWidth: 720, margin: "0 auto", padding: "9px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ background: C.red, width: 26, height: 26, borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, color: C.white }}>GA</div>
                <span style={{ color: C.white, fontSize: 12, fontWeight: 600, letterSpacing: 0.5 }}>Build AI Agents — Lab 2.0</span>
              </div>
              <div style={{ display: "flex", gap: 3 }}>
                {SECTIONS.map((s, i) => <div key={s.id} style={{ width: i === cs ? 20 : 6, height: 3, borderRadius: 2, background: i < cs ? C.green : i === cs ? C.red : C.darkGray, transition: "all 0.3s ease" }} />)}
              </div>
            </div>
          </div>
          <div style={{ maxWidth: 720, margin: "0 auto", padding: "14px 20px 0", display: "flex", gap: 5, flexWrap: "wrap" }}>
            {SECTIONS.map((s, i) => (
              <div key={s.id} onClick={() => { if (i < cs) setCs(i); }} style={{ display: "flex", alignItems: "center", gap: 5, padding: "4px 10px", borderRadius: 18, fontSize: 11, fontWeight: 600, background: i === cs ? C.red : i < cs ? "#E8F5E9" : C.warmGray, color: i === cs ? C.white : i < cs ? C.green : C.medGray, cursor: i < cs ? "pointer" : "default", transition: "all 0.2s ease" }}>
                <span>{i < cs ? "✓" : s.icon}</span>
                {(i === cs || i < cs) && <span>{s.label}</span>}
              </div>
            ))}
          </div>
          <div style={{ maxWidth: 720, margin: "0 auto", padding: "20px 20px 50px" }}>{renderSection()}</div>
          <div style={{ background: C.black, padding: "14px 20px", textAlign: "center", borderTop: `3px solid ${C.red}` }}>
            <span style={{ color: C.medGray, fontSize: 10, letterSpacing: 2 }}>GENERAL ASSEMBLY · AGENTIC AI TRAINING · BAA 2.0</span>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
